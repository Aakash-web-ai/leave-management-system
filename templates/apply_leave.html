{% extends "base.html" %}
{% block title %}Apply for Leave — LeaveDesk{% endblock %}
{% block content %}
<h1>Apply for Leave</h1>
<div class="card" style="max-width:520px;">
    <form method="POST">
        <label for="leave_type_id">Leave type</label>
        <select id="leave_type_id" name="leave_type_id" required>
            {% for lt in leave_types %}
            <option value="{{ lt.id }}">{{ lt.name }} ({{ lt.default_days_per_year }} days/yr)</option>
            {% endfor %}
        </select>

        <div class="grid-2">
            <div>
                <label for="start_date">Start date</label>
                <input type="date" id="start_date" name="start_date" min="{{ today }}" required>
            </div>
            <div>
                <label for="end_date">End date</label>
                <input type="date" id="end_date" name="end_date" min="{{ today }}" required>
            </div>
        </div>

        <label for="reason">Reason</label>
        <textarea id="reason" name="reason" placeholder="Briefly describe why you're requesting leave"></textarea>

        <button type="submit" class="btn btn-primary" style="margin-top:20px;">Submit Request</button>
    </form>
</div>
<p style="color:var(--ink-soft); font-size:0.85rem; margin-top:14px;">Weekends are excluded automatically when counting days. Your request goes to your manager for approval.</p>
{% endblock %}
